; MediaWiki PHP configuration
; Drop this file into /usr/local/etc/php/conf.d/ to override the production
; defaults shipped with the official mediawiki image.

; ---- Upload limits ----------------------------------------------------------
; Align post_max_size slightly above upload_max_filesize.
upload_max_filesize = 100M
post_max_size       = 105M

; ---- Memory -----------------------------------------------------------------
; MediaWiki recommends at least 256 M; raise to 512 M for busy wikis.
memory_limit = 256M

; ---- Session lifetime -------------------------------------------------------
; Default 1440 s (24 min) is too short for wiki editors; set to 24 hours.
session.gc_maxlifetime = 86400

; ---- Security ---------------------------------------------------------------
; MediaWiki does not need PHP to open remote URLs itself.
allow_url_fopen = Off

; ---- APCu (pre-installed in the official mediawiki image) ------------------
apc.shm_size    = 128M
apc.enable_cli  = 1

; ---- OPcache (pre-configured in the official image; fine-tune if needed) ---
opcache.memory_consumption    = 128
opcache.max_accelerated_files = 4000
opcache.revalidate_freq       = 60
