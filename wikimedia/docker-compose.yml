# docker-compose.yml — MediaWiki + MariaDB
#
# Usage:
#   cp .env.example .env   # fill in secrets (see .env.example)
#   docker compose up -d   # starts database + mediawiki
#
# First-time setup:
#   Visit http://localhost:8080 to run the web installer, OR use the CLI
#   one-liner documented in README.md. Either way, copy the resulting
#   LocalSettings.php next to this file before restarting the stack.

services:
  # ---- MediaWiki ------------------------------------------------------------
  mediawiki:
    build:
      context: .
      args:
        MEDIAWIKI_VERSION: "1.43"
    image: ${WIKI_NAME:-mywiki}-mediawiki:1.43
    container_name: ${WIKI_NAME:-mywiki}
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    volumes:
      # User-uploaded files must survive container restarts
      - mediawiki_images:/var/www/html/images
      # Mount LocalSettings.php once it has been generated by the installer.
      # Copy LocalSettings.example.php → LocalSettings.php and edit it, OR
      # download it from the web installer, then uncomment the line below.
      # - ./LocalSettings.php:/var/www/html/LocalSettings.php:ro
    environment:
      # These are read by LocalSettings.php via getenv() — see the example.
      MEDIAWIKI_DB_HOST: database
      MEDIAWIKI_DB_NAME: ${DB_NAME:-my_wiki}
      MEDIAWIKI_DB_USER: ${DB_USER:-wikiuser}
      MEDIAWIKI_DB_PASSWORD: ${DB_PASSWORD}
      MEDIAWIKI_SECRET_KEY: ${MW_SECRET_KEY}
      MEDIAWIKI_UPGRADE_KEY: ${MW_UPGRADE_KEY}
      MW_SITE_SERVER: ${MW_SITE_SERVER:-http://localhost:8080}
    networks:
      - internal_net
    healthcheck:
      test: ["CMD", "curl", "-fsSo", "/dev/null",
             "http://localhost/api.php?action=query&format=json"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  # ---- MariaDB --------------------------------------------------------------
  database:
    image: mariadb:10.11
    container_name: ${WIKI_NAME:-mywiki}-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-my_wiki}
      MYSQL_USER: ${DB_USER:-wikiuser}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal_net
    expose:
      # Port 3306 is visible only on the internal network, not the host.
      - "3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh",
             "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5

# ---- Volumes ----------------------------------------------------------------
volumes:
  mediawiki_images:
    name: ${WIKI_NAME:-mywiki}_images
  db_data:
    name: ${WIKI_NAME:-mywiki}_db

# ---- Networks ---------------------------------------------------------------
networks:
  internal_net:
    name: ${WIKI_NAME:-mywiki}_net
    driver: bridge
    # internal: true isolates the network from the internet.
    # For development, leave this false so the mediawiki container can reach
    # Wikimedia APIs (e.g. Wikidata). Set to true in production when a
    # reverse proxy handles all external traffic.
    internal: false
